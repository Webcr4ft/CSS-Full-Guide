<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Business Card</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="business-card">
    <img
      class="profile-image"
      src="https://cdn.freecodecamp.org/curriculum/labs/flower.jpg"
      alt="Profile picture of Eli Rex"
    >

    <p class="full-name">Eli Rex</p>
    <p class="designation">Frontend Developer</p>
    <p class="company">Rex Digital Solutions</p>

    <hr>

    <p>elirex@example.com</p>
    <p>+234 801 234 5678</p>

    <a
      class="portfolio-link"
      href="https://github.com/"
      target="_blank"
    >
      Portfolio
    </a>

    <hr>

    <div class="social-media">
      <h2>Connect with me</h2>

      <a href="https://twitter.com/" target="_blank">Twitter</a><br>
      <a href="https://www.linkedin.com/" target="_blank">LinkedIn</a><br>
      <a href="https://github.com/" target="_blank">GitHub</a>
    </div>
  </div>

</body>
</html>
