<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog Post Card</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="blog-post-card">
    <img
      class="post-img"
      src="https://cdn.freecodecamp.org/curriculum/labs/cover-photo.jpg"
      alt="A scenic mountain landscape with a lake"
    >

    <div class="post-content">
      <h2 class="post-title">Discover the Beauty of Nature</h2>

      <p class="post-excerpt">
        Nature offers breathtaking landscapes, peaceful environments, and unforgettable adventures. Explore forests, mountains, and lakes while reconnecting with the beauty of the outdoors.
      </p>

      <a href="#" class="read-more">Read More</a>
    </div>
  </div>

</body>
</html>
