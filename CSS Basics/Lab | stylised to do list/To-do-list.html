<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stylized To-Do List</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <h1>My To-Do List</h1>

  <ul class="todo-list">
    <li>
      <input type="checkbox" id="task1">
      <label for="task1">Complete HTML Lab</label>

      <ul class="sub-item">
        <li>
          <a class="sub-item-link" href="https://developer.mozilla.org/" target="_blank">
            HTML Reference
          </a>
        </li>
      </ul>
    </li>

    <li>
      <input type="checkbox" id="task2">
      <label for="task2">Practice CSS</label>

      <ul class="sub-item">
        <li>
          <a class="sub-item-link" href="https://www.w3schools.com/css/" target="_blank">
            CSS Tutorial
          </a>
        </li>
      </ul>
    </li>

    <li>
      <input type="checkbox" id="task3">
      <label for="task3">Study JavaScript</label>

      <ul class="sub-item">
        <li>
          <a class="sub-item-link" href="https://developer.mozilla.org/en-US/docs/Web/JavaScript" target="_blank">
            JavaScript Guide
          </a>
        </li>
      </ul>
    </li>

    <li>
      <input type="checkbox" id="task4">
      <label for="task4">Build a Project</label>

      <ul class="sub-item">
        <li>
          <a class="sub-item-link" href="https://www.freecodecamp.org/" target="_blank">
            freeCodeCamp
          </a>
        </li>
      </ul>
    </li>
  </ul>

</body>
</html>
